version: 2

project_name: bankport

before:
  hooks:
    - go mod tidy

builds:
  - id: bankport-api
    main: ./cmd/bankport-api
    binary: bankport-api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: bankportctl
    main: ./cmd/bankportctl
    binary: bankportctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: bankport
    ids:
      - bankport-api
      - bankportctl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
