services:
  api:
    build: .
    environment:
      BANKPORT_ENV: development
      PORT: "8080"
      OTEL_SERVICE_NAME: bankport_partner_api
      LOG_LEVEL: info
      RATE_LIMIT_PER_MINUTE: "120"
      IDEMPOTENCY_TTL: 24h
      WEBHOOK_SIGNING_KEY: dev-only-webhook-signing-key-change-me
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
