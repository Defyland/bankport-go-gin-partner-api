name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"
  NODE_VERSION: "22"
  GOVULNCHECK_VERSION: "v1.3.0"
  REDOCLY_VERSION: "2.31.5"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Check module graph
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test with race detector and coverage
        run: go test -race -coverpkg=./... -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Security scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          govulncheck ./...

      - name: OpenAPI lint
        run: npx --yes @redocly/cli@${REDOCLY_VERSION} lint openapi.yaml

      - name: Compose config
        run: docker compose config

      - name: Docker build
        run: docker build -t bankport-go-gin-partner-api:ci .
